<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Daily Planner 🍮</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FFFCF2; font-family: 'Nunito', sans-serif; }
  @keyframes float { 0%,100% { transform: translateY(0px) scale(1); } 50% { transform: translateY(-10px) scale(1.05); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .task-card { transition: all 0.2s ease; }
  .task-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(139,105,20,0.08) !important; }
  input:focus, textarea:focus { border-color: #E8C840 !important; box-shadow: 0 0 0 3px #FFF2B2 !important; outline: none; }
  button:active { transform: scale(0.97); }
  .two-column { display: flex; gap: 1.5rem; align-items: flex-start; }
  .calendar-column { width: 360px; flex-shrink: 0; position: sticky; top: 1rem; }
  .tasks-column { flex: 1; min-width: 0; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  @media (max-width: 900px) {
    .two-column { flex-direction: column; }
    .calendar-column { width: 100%; position: static; }
    .stats-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 500px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const PRIORITIES = ["urgent", "high", "medium", "low"];
const PC = {
  urgent: { bg: "#FFF0F0", text: "#C44040", border: "#F5A8A8", dot: "#E25555", emoji: "🍄" },
  high:   { bg: "#FFF5E0", text: "#A06B10", border: "#F2CC6B", dot: "#D4920A", emoji: "⭐" },
  medium: { bg: "#F0F5FF", text: "#4A72B0", border: "#A8C4F0", dot: "#5B8AD4", emoji: "🐟" },
  low:    { bg: "#F0FAF0", text: "#4A8A50", border: "#A8DCA8", dot: "#5BB05E", emoji: "🌱" },
};
const STATUS = ["todo", "in progress", "done"];
const DAY_START = 8, DAY_END = 19, PPM = 0.75;
const TOTAL_H = (DAY_END - DAY_START) * 60 * PPM;
const HOURS = Array.from({ length: DAY_END - DAY_START }, (_, i) => DAY_START + i);

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function toKey(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function formatDay(date) {
  const today = toKey(new Date()), key = toKey(date);
  const label = date.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  if (key === today) return "Today — " + label;
  if (key === toKey(addDays(new Date(), 1))) return "Tomorrow — " + label;
  if (key === toKey(addDays(new Date(), -1))) return "Yesterday — " + label;
  return label;
}
function fmt12(dt) {
  const d = new Date(dt), h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? "pm" : "am", h12 = h % 12 || 12;
  return h12 + (m ? ":" + String(m).padStart(2, "0") : "") + "\u202f" + ap;
}
function pxTop(dt) { const d = new Date(dt); return ((d.getHours() - DAY_START) * 60 + d.getMinutes()) * PPM; }
function pxH(s, e) { return Math.max((new Date(e) - new Date(s)) / 60000 * PPM, 18); }
function layoutEvents(evs) {
  const sorted = [...evs].sort((a, b) => new Date(a.start) - new Date(b.start));
  const cols = [];
  const assigned = sorted.map(ev => {
    let col = cols.findIndex(c => new Date(c[c.length-1].end) <= new Date(ev.start));
    if (col === -1) { cols.push([]); col = cols.length - 1; }
    cols[col].push(ev); return col;
  });
  const total = cols.length || 1;
  return sorted.map((ev, i) => ({ ev, col: assigned[i], total }));
}

// ========== GOOGLE CALENDAR CONFIG ==========
// Replace with your Google Cloud OAuth Client ID
// Get one at: https://console.cloud.google.com/apis/credentials
const GOOGLE_CLIENT_ID = "6783144170-utf499sq2uegjrf9e2sq0747gck917d9.apps.googleusercontent.com";
const CALENDAR_SCOPES = "https://www.googleapis.com/auth/calendar.readonly";
const CALENDAR_CACHE_KEY = "planner-gcal-cache-v1";
const CALENDAR_TOKEN_KEY = "planner-gcal-token-v1";

// ========== JSONBIN CONFIG ==========
// 1. Go to jsonbin.io and create a free account
// 2. Click "Create a Bin", paste: {}  and name it "my-planner"
// 3. Copy the Bin ID (from URL or dashboard) and paste below
const JSONBIN_BIN_ID = "69d4ae3336566621a887c5f2";
const JSONBIN_KEY_STORAGE = "planner-jsonbin-key";

function getJsonBinApiKey() {
  try {
    return localStorage.getItem(JSONBIN_KEY_STORAGE);
  } catch {}
  return null;
}

function setJsonBinApiKey(apiKey) {
  try {
    localStorage.setItem(JSONBIN_KEY_STORAGE, apiKey);
  } catch {}
}

function clearJsonBinApiKey() {
  try {
    localStorage.removeItem(JSONBIN_KEY_STORAGE);
  } catch {}
}

async function readJsonBin(apiKey, binId) {
  const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
    headers: { "X-Master-Key": apiKey }
  });
  const result = await response.json();
  if (!response.ok) throw new Error(result.message || "Failed to read bin");
  return result.record;
}

async function updateJsonBin(apiKey, binId, data) {
  const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": apiKey
    },
    body: JSON.stringify(data)
  });
  const result = await response.json();
  if (!response.ok) throw new Error(result.message || "Failed to update bin");
  return true;
}

function getCachedEvents() {
  try {
    const cached = localStorage.getItem(CALENDAR_CACHE_KEY);
    if (cached) {
      const { events } = JSON.parse(cached);
      return events;
    }
  } catch {}
  return null;
}

function setCachedEvents(events, syncTime) {
  try {
    localStorage.setItem(CALENDAR_CACHE_KEY, JSON.stringify({ events, syncTime: syncTime || Date.now() }));
  } catch {}
}

function getCachedSyncTime() {
  try {
    const cached = localStorage.getItem(CALENDAR_CACHE_KEY);
    if (cached) {
      const { syncTime } = JSON.parse(cached);
      return syncTime ? new Date(syncTime) : null;
    }
  } catch {}
  return null;
}

function clearCalendarCache() {
  try { localStorage.removeItem(CALENDAR_CACHE_KEY); } catch {}
}

function getStoredToken() {
  try {
    const stored = localStorage.getItem(CALENDAR_TOKEN_KEY);
    if (stored) {
      const { token, expiry } = JSON.parse(stored);
      if (Date.now() < expiry) return token;
    }
  } catch {}
  return null;
}

function setStoredToken(token, expiresIn) {
  try {
    localStorage.setItem(CALENDAR_TOKEN_KEY, JSON.stringify({
      token,
      expiry: Date.now() + (expiresIn * 1000) - 60000 // 1 min buffer
    }));
  } catch {}
}

function clearStoredToken() {
  try { localStorage.removeItem(CALENDAR_TOKEN_KEY); } catch {}
}

async function fetchGoogleCalendarEvents(accessToken, startDate, endDate) {
  const timeMin = new Date(startDate);
  timeMin.setHours(0, 0, 0, 0);
  const timeMax = new Date(endDate);
  timeMax.setHours(23, 59, 59, 999);

  const headers = { Authorization: `Bearer ${accessToken}` };

  // Fetch list of all calendars
  const calListResponse = await fetch(
    "https://www.googleapis.com/calendar/v3/users/me/calendarList",
    { headers }
  );

  if (!calListResponse.ok) {
    if (calListResponse.status === 401) throw new Error("AUTH_EXPIRED");
    throw new Error(`Calendar list error: ${calListResponse.status}`);
  }

  const calListData = await calListResponse.json();
  const calendars = (calListData.items || []).filter(cal => cal.selected !== false);

  // Fetch events from each calendar in parallel
  const params = new URLSearchParams({
    timeMin: timeMin.toISOString(),
    timeMax: timeMax.toISOString(),
    singleEvents: "true",
    orderBy: "startTime",
    maxResults: "250"
  });

  const eventPromises = calendars.map(async (cal) => {
    try {
      const response = await fetch(
        `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?${params}`,
        { headers }
      );
      if (!response.ok) return [];
      const data = await response.json();
      return (data.items || []).map(event => ({ ...event, calendarId: cal.id, calendarName: cal.summary }));
    } catch {
      return [];
    }
  });

  const allEventsArrays = await Promise.all(eventPromises);
  const allEvents = allEventsArrays.flat();

  return allEvents.map(event => {
    const start = event.start?.dateTime || event.start?.date;
    const end = event.end?.dateTime || event.end?.date;
    const startDate = new Date(start);
    const dateKey = toKey(startDate);

    // For free/busy only calendars, title might be hidden
    const title = event.summary || (event.visibility === "private" ? "Busy" : "(No title)");

    return {
      id: event.id,
      date: dateKey,
      title: title,
      start: start,
      end: end,
      declined: event.attendees?.some(a => a.self && a.responseStatus === "declined"),
      personal: event.organizer?.self && !event.attendees?.length,
      location: event.location,
      allDay: !event.start?.dateTime
    };
  });
}

function groupEventsByDate(events) {
  return events.reduce((acc, e) => {
    if (!acc[e.date]) acc[e.date] = [];
    acc[e.date].push(e);
    return acc;
  }, {});
}
const STORAGE_KEY = "planner-tasks-v1";

function loadData() {
  try { const v = localStorage.getItem(STORAGE_KEY); if (v) return JSON.parse(v); } catch {}
  return {};
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }

const EF = { text: "", priority: "medium", notes: "", duration: "" };
const T = {
  bg:"#FFFCF2",cream:"#FFF9E8",surface:"#FFFDF5",surfaceWarm:"#FFF7DC",
  yellow:"#FFE066",yellowSoft:"#FFF2B2",yellowDeep:"#E8C840",yellowPale:"#FFFBE6",
  brown:"#8B6914",brownLight:"#BFA04D",
  green:"#7CB342",greenSoft:"#E8F5D4",greenPale:"#F2FADE",greenDark:"#558B2F",
  border:"#F0E6C0",borderSoft:"#F5EDD4",
  text:"#5C4A1E",textSecondary:"#8B7A4A",textTertiary:"#B8A878",textLight:"#D0C4A0",
};
const font = "'Nunito', sans-serif";
const btnBase = { fontSize:13,padding:"8px 18px",borderRadius:10,border:`1.5px solid ${T.border}`,background:"transparent",cursor:"pointer",color:T.text,fontFamily:font };
const inputBase = { width:"100%",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${T.border}`,background:T.surface,color:T.text,boxSizing:"border-box",fontFamily:font,outline:"none" };

function Clover({ size=16, style={} }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" style={style}>
      <g fill="#7CB342" opacity="0.9">
        <ellipse cx="12" cy="8" rx="4.5" ry="5"/>
        <ellipse cx="8" cy="13" rx="4.5" ry="5" transform="rotate(-30 8 13)"/>
        <ellipse cx="16" cy="13" rx="4.5" ry="5" transform="rotate(30 16 13)"/>
      </g>
      <line x1="12" y1="14" x2="12" y2="23" stroke="#558B2F" strokeWidth="1.5" strokeLinecap="round"/>
    </svg>
  );
}

function App() {
  const [allTasks, setAllTasks] = useState(() => loadData());
  const [currentDate, setCurrentDate] = useState(new Date());
  const [form, setForm] = useState(EF);
  const [editId, setEditId] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [filter, setFilter] = useState("active");
  const [showDoneConfirm, setShowDoneConfirm] = useState(false);
  const [calCollapsed, setCalCollapsed] = useState(false);

  // Google Calendar state - load from cache on init
  const [calEvents, setCalEvents] = useState(() => {
    const cached = getCachedEvents();
    return cached ? groupEventsByDate(cached) : {};
  });
  const [calConnected, setCalConnected] = useState(() => !!getStoredToken());
  const [calLoading, setCalLoading] = useState(false);
  const [calError, setCalError] = useState(null);
  const [lastSync, setLastSync] = useState(() => getCachedSyncTime());
  const [tokenClient, setTokenClient] = useState(null);

  // JSONBin state
  const [jsonBinApiKey, setJsonBinApiKeyState] = useState(() => getJsonBinApiKey());
  const [showSettings, setShowSettings] = useState(false);
  const [syncStatus, setSyncStatus] = useState(null);
  const [apiKeyInput, setApiKeyInput] = useState("");

  const dayKey = toKey(currentDate);
  const tasks = allTasks[dayKey] || [];
  const isToday = dayKey === toKey(new Date());
  const dayEvents = calEvents[dayKey] || [];

  // Initialize Google OAuth client
  useEffect(() => {
    if (GOOGLE_CLIENT_ID === "YOUR_CLIENT_ID.apps.googleusercontent.com") {
      setCalError("Please configure GOOGLE_CLIENT_ID");
      return;
    }

    const initClient = () => {
      if (window.google?.accounts?.oauth2) {
        const client = window.google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: CALENDAR_SCOPES,
          callback: (response) => {
            if (response.access_token) {
              setStoredToken(response.access_token, response.expires_in);
              setCalConnected(true);
              setCalError(null);
              fetchEvents(response.access_token);
            } else if (response.error) {
              setCalError(`Auth failed: ${response.error}`);
            }
          },
        });
        setTokenClient(client);

        // Check for existing token and fetch events
        const existingToken = getStoredToken();
        if (existingToken) {
          fetchEvents(existingToken);
        }
      }
    };

    // Wait for Google script to load
    if (window.google?.accounts?.oauth2) {
      initClient();
    } else {
      const checkGoogle = setInterval(() => {
        if (window.google?.accounts?.oauth2) {
          clearInterval(checkGoogle);
          initClient();
        }
      }, 100);
      return () => clearInterval(checkGoogle);
    }
  }, []);

  // Load cached events (no auto-fetch - only manual refresh)
  useEffect(() => {
    const cached = getCachedEvents();
    if (cached) {
      setCalEvents(groupEventsByDate(cached));
    }
  }, []);

  async function fetchEvents(accessToken) {
    setCalLoading(true);
    setCalError(null);
    try {
      // Fetch 4 weeks of events centered around current date
      const startDate = addDays(currentDate, -14);
      const endDate = addDays(currentDate, 21);
      const events = await fetchGoogleCalendarEvents(accessToken, startDate, endDate);
      const syncTime = Date.now();
      setCachedEvents(events, syncTime);
      setCalEvents(groupEventsByDate(events));
      setLastSync(new Date(syncTime));
    } catch (err) {
      if (err.message === "AUTH_EXPIRED") {
        setCalConnected(false);
        clearStoredToken();
        clearCalendarCache();
        setCalError("Session expired. Please reconnect.");
      } else {
        setCalError(err.message);
      }
    } finally {
      setCalLoading(false);
    }
  }

  function connectCalendar() {
    if (tokenClient) {
      tokenClient.requestAccessToken({ prompt: "consent" });
    }
  }

  function disconnectCalendar() {
    const token = getStoredToken();
    if (token && window.google?.accounts?.oauth2) {
      window.google.accounts.oauth2.revoke(token);
    }
    clearStoredToken();
    clearCalendarCache();
    setCalConnected(false);
    setCalEvents({});
    setLastSync(null);
    setCalError(null);
  }

  function refreshCalendar() {
    const token = getStoredToken();
    if (token) {
      clearCalendarCache();
      fetchEvents(token);
    }
  }

  function exportTasks() {
    const data = JSON.stringify(allTasks, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `planner-tasks-${toKey(new Date())}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importTasks(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        setAllTasks(data);
      } catch {
        alert("Invalid file format");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  async function saveApiKey() {
    if (!apiKeyInput.trim()) return;
    if (!JSONBIN_BIN_ID) {
      setSyncStatus("Error: Set JSONBIN_BIN_ID in code first");
      return;
    }
    setSyncStatus("Verifying...");
    try {
      // Verify the API key works with the bin
      await readJsonBin(apiKeyInput, JSONBIN_BIN_ID);
      setJsonBinApiKey(apiKeyInput);
      setJsonBinApiKeyState(apiKeyInput);
      setApiKeyInput("");
      setSyncStatus("Connected!");
      setTimeout(() => setSyncStatus(null), 2000);
    } catch (err) {
      setSyncStatus("Error: " + err.message);
    }
  }

  async function pushToCloud() {
    if (!jsonBinApiKey || !JSONBIN_BIN_ID) return;
    setSyncStatus("Pushing...");
    try {
      await updateJsonBin(jsonBinApiKey, JSONBIN_BIN_ID, allTasks);
      setSyncStatus("Pushed!");
      setTimeout(() => setSyncStatus(null), 2000);
    } catch (err) {
      setSyncStatus("Error: " + err.message);
    }
  }

  async function pullFromCloud() {
    if (!jsonBinApiKey || !JSONBIN_BIN_ID) return;
    setSyncStatus("Pulling...");
    try {
      const data = await readJsonBin(jsonBinApiKey, JSONBIN_BIN_ID);
      setAllTasks(data);
      setSyncStatus("Pulled!");
      setTimeout(() => setSyncStatus(null), 2000);
    } catch (err) {
      setSyncStatus("Error: " + err.message);
    }
  }

  function disconnectCloud() {
    clearJsonBinApiKey();
    setJsonBinApiKeyState(null);
    setSyncStatus(null);
  }

  useEffect(() => { saveData(allTasks); }, [allTasks]);

  function setTasks(fn) {
    setAllTasks(prev => {
      const cur = prev[dayKey] || [];
      const next = typeof fn === "function" ? fn(cur) : fn;
      return { ...prev, [dayKey]: next };
    });
  }
  function addTask() {
    if (!form.text.trim()) return;
    if (editId) {
      setTasks(ts => ts.map(tk => tk.id === editId ? { ...tk, ...form } : tk));
      setEditId(null);
    } else {
      setTasks(ts => [...ts, { id: genId(), ...form, status: "todo", createdAt: Date.now(), carriedForward: false }]);
    }
    setForm(EF); setShowForm(false);
  }
  function startEdit(tk) {
    setForm({ text: tk.text, priority: tk.priority, notes: tk.notes||"", duration: tk.duration||"" });
    setEditId(tk.id); setShowForm(true);
  }
  function toggleDone(id) {
    setTasks(ts => ts.map(tk => tk.id !== id ? tk : { ...tk, status: tk.status === "done" ? "todo" : "done" }));
  }
  function cycleStatus(id) {
    setTasks(ts => ts.map(tk => tk.id !== id ? tk : { ...tk, status: STATUS[(STATUS.indexOf(tk.status)+1)%STATUS.length] }));
  }
  function removeTask(id) { setTasks(ts => ts.filter(tk => tk.id !== id)); }
  function finishDay() {
    const nextKey = toKey(addDays(currentDate, 1));
    setAllTasks(prev => {
      const cur = prev[dayKey] || [];
      const remaining = cur.filter(tk => tk.status !== "done");
      if (!remaining.length) return prev;
      const next = prev[nextKey] || [];
      const carried = remaining.map(tk => ({ ...tk, id: genId(), carriedForward: true, status: "todo", createdAt: Date.now() }));
      const merged = carried.concat(next.filter(nt => !carried.some(c => c.text === nt.text)));
      const updatedToday = cur.map(tk => tk.status !== "done" ? { ...tk, status: "done" } : tk);
      return { ...prev, [dayKey]: updatedToday, [nextKey]: merged };
    });
    setShowDoneConfirm(false);
    setCurrentDate(addDays(currentDate, 1));
  }

  const PO = { urgent:0, high:1, medium:2, low:3 };
  const sorted = tasks
    .filter(tk => filter === "all" ? true : filter === "active" ? tk.status !== "done" : tk.status === "done")
    .slice().sort((a,b) => PO[a.priority] - PO[b.priority]);
  const counts = {
    total: tasks.length,
    done: tasks.filter(tk => tk.status === "done").length,
    urgent: tasks.filter(tk => tk.priority === "urgent" && tk.status !== "done").length,
    carried: tasks.filter(tk => tk.carriedForward).length,
  };
  const activeCount = counts.total - counts.done;

  // Switch to "all" tab when no active tasks remain
  useEffect(() => {
    if (filter === "active" && counts.total > 0 && activeCount === 0) {
      setFilter("all");
    }
  }, [activeCount, counts.total, filter]);

  const timedEvents = dayEvents.filter(e => e.start && !e.allDay);
  const allDayEvents = dayEvents.filter(e => e.allDay);
  const laid = layoutEvents(timedEvents);
  const progressPct = counts.total > 0 ? Math.round((counts.done/counts.total)*100) : 0;
  const greetings = ["Let's have a great day!","You've got this!","One task at a time ~","Doing great so far!"];
  const greeting = greetings[new Date().getDay() % greetings.length];

  return (
    <div style={{ padding:"1.5rem 2rem 2.5rem", fontFamily:font, maxWidth:1200, margin:"0 auto", color:T.text, background:T.bg, minHeight:"100vh" }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:6 }}>
        <div style={{ animation:"float 3s ease-in-out infinite", fontSize:36 }}><img src="https://res.cloudinary.com/dt9v3cjuk/image/upload/v1775538231/Pompompurin_gqkyef.png" height="100"/></div>
        <div style={{ flex:1 }}>
          <p style={{ fontSize:20, fontWeight:800, color:T.brown, margin:0, letterSpacing:"-0.02em" }}>My Daily Planner</p>
          <p style={{ fontSize:12, color:T.brownLight, margin:"2px 0 0", fontWeight:500 }}>
            <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}><Clover size={13}/>{greeting}<Clover size={13}/></span>
          </p>
        </div>
        <div style={{ display:"flex", gap:4, alignItems:"center" }}>
          {syncStatus && <span style={{ fontSize:10, color:T.textTertiary, marginRight:4 }}>{syncStatus}</span>}
          {jsonBinApiKey && JSONBIN_BIN_ID ? (
            <>
              <button onClick={pullFromCloud} style={{ fontSize:10, padding:"4px 8px", borderRadius:6, border:`1px solid ${T.borderSoft}`, background:"transparent", color:T.textTertiary, cursor:"pointer", fontFamily:font, fontWeight:600 }}>↓ Pull</button>
              <button onClick={pushToCloud} style={{ fontSize:10, padding:"4px 8px", borderRadius:6, border:`1px solid ${T.greenSoft}`, background:T.greenPale, color:T.green, cursor:"pointer", fontFamily:font, fontWeight:600 }}>↑ Push</button>
            </>
          ) : null}
          <button onClick={() => setShowSettings(s => !s)} style={{ fontSize:10, padding:"4px 8px", borderRadius:6, border:`1px solid ${T.borderSoft}`, background:showSettings?T.cream:"transparent", color:T.textTertiary, cursor:"pointer", fontFamily:font, fontWeight:600 }}>⚙</button>
        </div>
      </div>
      {/* Settings Panel */}
      {showSettings && (
        <div style={{ marginBottom:"1rem", background:T.cream, borderRadius:12, padding:"12px 16px", border:`1.5px solid ${T.border}` }}>
          <p style={{ fontSize:12, fontWeight:700, color:T.brown, margin:"0 0 8px" }}>Cloud Sync (JSONBin.io)</p>
          {!JSONBIN_BIN_ID ? (
            <p style={{ fontSize:11, color:"#C44040", margin:0 }}>
              Set JSONBIN_BIN_ID in the code first.<br/>
              <span style={{ color:T.textSecondary }}>Create a bin at jsonbin.io, then add the ID to index.html</span>
            </p>
          ) : jsonBinApiKey ? (
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:11, color:T.green, fontWeight:600 }}>✓ Connected</span>
              <button onClick={disconnectCloud} style={{ fontSize:10, padding:"4px 8px", borderRadius:6, border:`1px solid ${T.borderSoft}`, background:"transparent", color:T.textTertiary, cursor:"pointer", fontFamily:font }}>Forget API Key</button>
            </div>
          ) : (
            <div>
              <p style={{ fontSize:11, color:T.textSecondary, margin:"0 0 8px" }}>
                Enter your JSONBin API key to enable sync:
              </p>
              <div style={{ display:"flex", gap:8 }}>
                <input
                  type="password"
                  value={apiKeyInput}
                  onChange={e => setApiKeyInput(e.target.value)}
                  placeholder="Paste API Key"
                  style={{ ...inputBase, flex:1, fontSize:12, padding:"6px 10px" }}
                />
                <button onClick={saveApiKey} style={{ fontSize:11, padding:"6px 14px", borderRadius:8, border:"none", background:T.yellowDeep, color:T.brown, cursor:"pointer", fontFamily:font, fontWeight:700 }}>Save</button>
              </div>
            </div>
          )}
          <div style={{ marginTop:12, paddingTop:10, borderTop:`1px solid ${T.borderSoft}` }}>
            <p style={{ fontSize:11, color:T.textTertiary, margin:"0 0 6px" }}>Manual backup:</p>
            <div style={{ display:"flex", gap:4 }}>
              <button onClick={exportTasks} style={{ fontSize:10, padding:"4px 8px", borderRadius:6, border:`1px solid ${T.borderSoft}`, background:"transparent", color:T.textTertiary, cursor:"pointer", fontFamily:font, fontWeight:600 }}>Export JSON</button>
              <label style={{ fontSize:10, padding:"4px 8px", borderRadius:6, border:`1px solid ${T.borderSoft}`, background:"transparent", color:T.textTertiary, cursor:"pointer", fontFamily:font, fontWeight:600 }}>
                Import JSON
                <input type="file" accept=".json" onChange={importTasks} style={{ display:"none" }} />
              </label>
            </div>
          </div>
        </div>
      )}
      {/* Day Nav */}
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:"1.25rem", background:T.surfaceWarm, borderRadius:14, padding:"8px 10px", border:`1.5px solid ${T.border}` }}>
        <button onClick={() => setCurrentDate(d => addDays(d,-1))} style={{ ...btnBase, padding:"4px 10px", fontSize:18, color:T.brownLight, background:"transparent", border:"none" }}>‹</button>
        <div style={{ flex:1, textAlign:"center" }}>
          <p style={{ fontSize:15, fontWeight:700, color:T.brown, margin:0 }}>{formatDay(currentDate)}</p>
          {isToday && <p style={{ fontSize:11, color:T.green, margin:"1px 0 0", fontWeight:600 }}>🍀 today</p>}
        </div>
        {!isToday && <button onClick={() => setCurrentDate(new Date())} style={{ ...btnBase, fontSize:11, padding:"4px 10px", color:T.green, borderColor:T.greenSoft, background:T.greenPale, fontWeight:700, borderRadius:20 }}>Today</button>}
        <button onClick={() => setCurrentDate(d => addDays(d,1))} style={{ ...btnBase, padding:"4px 10px", fontSize:18, color:T.brownLight, background:"transparent", border:"none" }}>›</button>
      </div>
      {/* Two Column Layout */}
      <div className="two-column">
      {/* Left Column - Calendar */}
      <div className="calendar-column">
      {/* Calendar */}
      <div style={{ borderRadius:14, border:`1.5px solid ${T.border}`, overflow:"hidden", background:T.surface }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"9px 14px", background:T.cream, borderBottom:calCollapsed?"none":`1px solid ${T.borderSoft}` }}>
          <button onClick={() => setCalCollapsed(c=>!c)} style={{ display:"flex", alignItems:"center", gap:6, border:"none", background:"transparent", cursor:"pointer", fontFamily:font, padding:0 }}>
            <span style={{ fontSize:14 }}>📅</span>
            <span style={{ fontSize:13, fontWeight:700, color:T.brown }}>
              {calLoading ? "Loading..." : dayEvents.length > 0 ? dayEvents.length+" event"+(dayEvents.length!==1?"s":"") : "No events"}
            </span>
            <span style={{ fontSize:11, color:T.textTertiary }}>{calCollapsed?"▸":"▾"}</span>
          </button>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            {lastSync && (
              <span style={{ fontSize:10, color:T.textLight, fontWeight:500 }}>
                Synced {lastSync.toLocaleDateString([], { month:"short", day:"numeric" })} {lastSync.toLocaleTimeString([], { hour:"numeric", minute:"2-digit" })}
              </span>
            )}
            {lastSync ? (
              <div style={{ display:"flex", gap:4 }}>
                <button onClick={(e) => { e.stopPropagation(); calConnected ? refreshCalendar() : connectCalendar(); }} disabled={calLoading} style={{ fontSize:10, padding:"3px 8px", borderRadius:6, border:`1px solid ${T.borderSoft}`, background:"transparent", color:T.textTertiary, cursor:calLoading?"not-allowed":"pointer", fontFamily:font, fontWeight:600 }}>
                  {calLoading ? "..." : "↻ Sync"}
                </button>
                {calConnected && (
                  <button onClick={(e) => { e.stopPropagation(); disconnectCalendar(); }} style={{ fontSize:10, padding:"3px 8px", borderRadius:6, border:`1px solid ${T.borderSoft}`, background:"transparent", color:T.textTertiary, cursor:"pointer", fontFamily:font, fontWeight:600 }}>
                    Disconnect
                  </button>
                )}
              </div>
            ) : (
              <button onClick={(e) => { e.stopPropagation(); connectCalendar(); }} style={{ fontSize:11, padding:"4px 12px", borderRadius:8, border:`1.5px solid ${T.greenSoft}`, background:T.greenPale, color:T.green, cursor:"pointer", fontFamily:font, fontWeight:700 }}>
                Connect Google Calendar
              </button>
            )}
          </div>
        </div>
        {!calCollapsed && dayEvents.length > 0 && (
          <div style={{ padding:"8px 10px 6px" }}>
            {/* All-day events */}
            {allDayEvents.length > 0 && (
              <div style={{ marginBottom:8, display:"flex", flexWrap:"wrap", gap:4 }}>
                {allDayEvents.map((ev, i) => {
                  const dec=ev.declined;
                  const isBusy=ev.title==="Busy";
                  const bgCol=dec?T.borderSoft:isBusy?"#F0EDE0":T.surfaceWarm;
                  const borderCol=dec?T.textLight:isBusy?T.brownLight:T.yellowDeep;
                  const textCol=dec?T.textLight:isBusy?T.textTertiary:T.brown;
                  return (
                    <div key={i} style={{ fontSize:11, padding:"4px 10px", borderRadius:6, background:bgCol, borderLeft:`3px solid ${borderCol}`, border:`1px solid ${T.borderSoft}`, color:textCol, fontWeight:600, opacity:dec?0.5:isBusy?0.7:1 }}>
                      {ev.title}
                    </div>
                  );
                })}
              </div>
            )}
            {/* Timed events */}
            {timedEvents.length > 0 && (
          <div style={{ display:"flex" }}>
            <div style={{ width:36, flexShrink:0, position:"relative", height:TOTAL_H }}>
              {HOURS.map(h => (
                <div key={h} style={{ position:"absolute", top:(h-DAY_START)*60*PPM-5, right:4, fontSize:10, color:T.textLight, textAlign:"right", lineHeight:1, fontWeight:600 }}>
                  {h>12?h-12:h}{h>=12?"p":"a"}
                </div>
              ))}
            </div>
            <div style={{ flex:1, position:"relative", height:TOTAL_H, marginRight:10, minWidth:0 }}>
              {HOURS.map(h => <div key={h} style={{ position:"absolute", top:(h-DAY_START)*60*PPM, left:0, right:0, height:1, background:T.borderSoft }}/>)}
              {laid.map((item,i) => {
                const ev=item.ev,col=item.col,total=item.total;
                const top=pxTop(ev.start),h=pxH(ev.start,ev.end);
                const w=`calc(${Math.floor(100/total)}% - 4px)`;
                const left=`calc(${Math.floor(col*100/total)}% + 2px)`;
                const dec=ev.declined;
                const isBusy=ev.title==="Busy";
                const bgCol=dec?"#F8F4E8":isBusy?"#F0EDE0":T.surfaceWarm;
                const borderCol=dec?T.textLight:isBusy?T.brownLight:T.yellowDeep;
                const textCol=dec?T.textLight:isBusy?T.textTertiary:T.brown;
                return (
                  <div key={i} style={{ position:"absolute",top,left,width:w,height:h,background:bgCol,border:`1px solid ${T.borderSoft}`,borderLeft:`3px solid ${borderCol}`,borderRadius:6,padding:"3px 6px",boxSizing:"border-box",overflow:"hidden",opacity:dec?0.5:isBusy?0.7:1 }}>
                    <p style={{ margin:0,fontSize:10,fontWeight:700,color:textCol,lineHeight:1.3,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",fontFamily:font }}>{ev.title}</p>
                    {h>22&&<p style={{ margin:"1px 0 0",fontSize:9,color:textCol,opacity:0.6,fontWeight:500 }}>{fmt12(ev.start)}–{fmt12(ev.end)}</p>}
                  </div>
                );
              })}
            </div>
          </div>
            )}
          </div>
        )}
        {!calCollapsed && dayEvents.length === 0 && (
          <div style={{ padding:"14px 16px", textAlign:"center" }}>
            {calError ? (
              <p style={{ margin:0, fontSize:12, color:"#C44040" }}>{calError}</p>
            ) : calLoading ? (
              <p style={{ margin:0, fontSize:12, color:T.textTertiary }}>Loading events...</p>
            ) : !lastSync ? (
              <div>
                <p style={{ margin:"0 0 8px", fontSize:12, color:T.textTertiary }}>Connect your Google Calendar to see events</p>
                <button onClick={connectCalendar} style={{ fontSize:12, padding:"6px 16px", borderRadius:10, border:`1.5px solid ${T.greenSoft}`, background:T.greenPale, color:T.green, cursor:"pointer", fontFamily:font, fontWeight:700 }}>
                  Connect Google Calendar
                </button>
              </div>
            ) : (
              <p style={{ margin:0, fontSize:12, color:T.textTertiary }}>No events today — more time for tasks! ✨</p>
            )}
          </div>
        )}
      </div>
      </div>
      {/* Right Column - Tasks */}
      <div className="tasks-column">
      {/* Progress */}
      {counts.total > 0 && (
        <div style={{ marginBottom:"1.25rem", background:T.cream, borderRadius:12, padding:"10px 14px", border:`1.5px solid ${T.border}` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
            <span style={{ fontSize:12, color:T.textSecondary, fontWeight:600 }}>{counts.done === counts.total ? "🎉 All done!" : `${counts.done} of ${counts.total} done`}</span>
            <span style={{ fontSize:12, color:T.brownLight, fontWeight:700 }}>{progressPct}%</span>
          </div>
          <div style={{ height:8, background:T.yellowPale, borderRadius:10, overflow:"hidden", border:`1px solid ${T.borderSoft}` }}>
            <div style={{ height:"100%", width:progressPct+"%", background: progressPct===100 ? `linear-gradient(90deg,${T.green},#A5D66F)` : `linear-gradient(90deg,${T.yellow},${T.yellowDeep})`, borderRadius:10, transition:"width 0.5s cubic-bezier(0.34,1.56,0.64,1)" }}/>
          </div>
        </div>
      )}
      {/* Stats */}
      <div className="stats-grid">
        {[
          { label:"Total", val:counts.total, emoji:"🐾", color:T.brown },
          { label:"Done", val:counts.done, emoji:"🍀", color:T.greenDark },
          { label:"Urgent", val:counts.urgent, emoji:"🍄", color:counts.urgent>0?"#C44040":T.textLight },
          { label:"Carried", val:counts.carried, emoji:"🐣", color:counts.carried>0?"#A06B10":T.textLight },
        ].map(item => (
          <div key={item.label} style={{ background:T.cream, borderRadius:12, padding:"10px", border:`1.5px solid ${T.borderSoft}`, textAlign:"center" }}>
            <p style={{ fontSize:18, margin:"0 0 2px" }}>{item.emoji}</p>
            <p style={{ fontSize:22, fontWeight:800, margin:0, color:item.color }}>{item.val}</p>
            <p style={{ fontSize:10, color:T.textTertiary, margin:"2px 0 0", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.04em" }}>{item.label}</p>
          </div>
        ))}
      </div>
      {/* Actions */}
      <div style={{ display:"flex", gap:8, marginBottom:"1rem", flexWrap:"wrap", alignItems:"center" }}>
        <button onClick={() => { setShowForm(f=>!f); setEditId(null); setForm(EF); }} style={{ ...btnBase, background:showForm&&!editId?"transparent":`linear-gradient(135deg,${T.yellow},${T.yellowDeep})`, color:showForm&&!editId?T.textSecondary:T.brown, border:showForm&&!editId?`1.5px solid ${T.border}`:"1.5px solid transparent", fontWeight:800, boxShadow:showForm&&!editId?"none":"0 2px 8px rgba(232,200,64,0.3)" }}>
          {showForm&&!editId?"Cancel":"＋ Add task"}
        </button>
        {isToday && <button onClick={() => setShowDoneConfirm(true)} style={{ ...btnBase, color:T.green, borderColor:T.greenSoft, background:T.greenPale, fontWeight:700 }}>Done with today 🌟</button>}
        <div style={{ marginLeft:"auto", display:"flex", background:T.cream, borderRadius:20, border:`1.5px solid ${T.border}`, overflow:"hidden" }}>
          {["active","all","done"].map((f,i,arr) => (
            <button key={f} onClick={() => setFilter(f)} style={{ fontSize:11, padding:"6px 14px", border:"none", background:filter===f?T.surfaceWarm:"transparent", cursor:"pointer", color:filter===f?T.brown:T.textTertiary, textTransform:"capitalize", fontWeight:filter===f?700:500, fontFamily:font, borderRight:i<arr.length-1?`1px solid ${T.borderSoft}`:"none" }}>{f}</button>
          ))}
        </div>
      </div>
      {/* Finish Day */}
      {showDoneConfirm && (
        <div style={{ background:T.surfaceWarm, border:`1.5px solid ${T.border}`, borderRadius:14, padding:"1rem 1.25rem", marginBottom:"1rem", animation:"fadeIn 0.2s ease" }}>
          <p style={{ fontSize:16, fontWeight:800, margin:"0 0 6px", color:T.brown }}>Wrap up the day? 🌙</p>
          <p style={{ fontSize:13, color:T.textSecondary, margin:"0 0 14px", fontWeight:500 }}>{counts.total-counts.done} unfinished task{counts.total-counts.done!==1?"s":""} will hop over to tomorrow.</p>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={finishDay} style={{ ...btnBase, background:`linear-gradient(135deg,${T.yellow},${T.yellowDeep})`, color:T.brown, border:"none", fontWeight:800 }}>Yes, carry forward ✨</button>
            <button onClick={() => setShowDoneConfirm(false)} style={{ ...btnBase, color:T.textSecondary }}>Nevermind</button>
          </div>
        </div>
      )}
      {/* Form */}
      {showForm && (
        <div style={{ background:T.cream, border:`1.5px solid ${T.border}`, borderRadius:14, padding:"1rem", marginBottom:"1rem", animation:"fadeIn 0.2s ease" }}>
          <input value={form.text} onChange={e => setForm(f=>({...f,text:e.target.value}))} placeholder="What needs doing? 🌻" onKeyDown={e=>{ if(e.key==="Enter") addTask(); }} style={{ ...inputBase, fontSize:15, fontWeight:600, marginBottom:10 }}/>
          <div style={{ display:"flex", gap:10, marginBottom:10 }}>
            <textarea value={form.notes} onChange={e => setForm(f=>({...f,notes:e.target.value}))} placeholder="Notes (optional)..." rows={2} style={{ ...inputBase, flex:1, resize:"vertical", fontSize:13 }}/>
            <div style={{ display:"flex", flexDirection:"column", gap:4, minWidth:90 }}>
              <label style={{ fontSize:10, color:T.textTertiary, fontWeight:700, letterSpacing:"0.06em", textTransform:"uppercase" }}>Duration</label>
              <input type="number" min="5" step="5" value={form.duration} onChange={e=>setForm(f=>({...f,duration:e.target.value}))} placeholder="min" style={{ ...inputBase, fontSize:13 }}/>
            </div>
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
            {PRIORITIES.map(p => {
              const c=PC[p],sel=form.priority===p;
              return <button key={p} onClick={()=>setForm(f=>({...f,priority:p}))} style={{ fontSize:12,padding:"5px 14px",borderRadius:20,border:sel?`2px solid ${c.border}`:`1.5px solid ${T.border}`,background:sel?c.bg:"transparent",color:sel?c.text:T.textTertiary,cursor:"pointer",textTransform:"capitalize",fontWeight:sel?700:500,fontFamily:font }}>{c.emoji} {p}</button>;
            })}
            <button onClick={addTask} style={{ marginLeft:"auto",fontSize:14,padding:"7px 22px",borderRadius:20,border:"none",background:`linear-gradient(135deg,${T.yellow},${T.yellowDeep})`,color:T.brown,cursor:"pointer",fontWeight:800,fontFamily:font }}>{editId?"Save":"Add"} ✨</button>
          </div>
        </div>
      )}
      {/* Empty */}
      {sorted.length === 0 && (
        <div style={{ textAlign:"center", padding:"3rem 0", color:T.textTertiary, animation:"fadeIn 0.3s ease" }}>
          <div style={{ animation:"float 3s ease-in-out infinite", marginBottom:10 }}><Clover size={36}/></div>
          <p style={{ fontSize:14, fontWeight:600, margin:0 }}>{filter==="done"?"No completed tasks yet!":"No tasks yet — add one above!"}</p>
        </div>
      )}
      {/* Tasks */}
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {sorted.map((tk,idx) => {
          const c=PC[tk.priority],done=tk.status==="done";
          return (
            <div key={tk.id} className="task-card" style={{ background:T.surface,border:`1.5px solid ${done?T.borderSoft:c.border}`,borderRadius:14,padding:"12px 14px",opacity:done?0.5:1,animation:`fadeIn 0.25s ease ${idx*0.03}s both` }}>
              <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
                <button onClick={()=>toggleDone(tk.id)} style={{ marginTop:2,width:22,height:22,borderRadius:"50%",border:`2px solid ${c.dot}`,background:done?c.bg:tk.status==="in progress"?c.bg:"transparent",flexShrink:0,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center" }}>
                  {done&&<span style={{ fontSize:10,color:c.text,fontWeight:800 }}>☘</span>}
                  {tk.status==="in progress"&&<span style={{ width:8,height:8,borderRadius:"50%",background:c.dot }}/>}
                </button>
                <div style={{ flex:1, minWidth:0 }}>
                  <p style={{ margin:"0 0 4px",fontSize:14,fontWeight:700,color:T.text,textDecoration:done?"line-through":"none" }}>{tk.text}</p>
                  {tk.notes&&<p style={{ margin:"0 0 8px",fontSize:12,color:T.textSecondary,lineHeight:1.5,fontWeight:500 }}>{tk.notes}</p>}
                  <div style={{ display:"flex",gap:5,flexWrap:"wrap",alignItems:"center" }}>
                    <span style={{ fontSize:11,padding:"2px 10px",borderRadius:20,background:c.bg,color:c.text,border:`1px solid ${c.border}`,textTransform:"capitalize",fontWeight:700 }}>{c.emoji} {tk.priority}</span>
                    <button onClick={()=>cycleStatus(tk.id)} style={{ fontSize:11,padding:"2px 10px",borderRadius:20,border:`1px solid ${T.border}`,background:T.cream,color:T.textSecondary,cursor:"pointer",textTransform:"capitalize",fontWeight:600,fontFamily:font }}>{tk.status}</button>
                    {tk.duration&&<span style={{ fontSize:11,padding:"2px 10px",borderRadius:20,background:T.cream,color:T.textSecondary,border:`1px solid ${T.borderSoft}`,fontWeight:600 }}>{tk.duration}m</span>}
                    {tk.carriedForward&&<span style={{ fontSize:11,padding:"2px 10px",borderRadius:20,background:T.surfaceWarm,color:T.brownLight,border:`1px solid ${T.border}`,fontWeight:600 }}>🐣 carried</span>}
                  </div>
                </div>
                <div style={{ display:"flex",gap:3,flexShrink:0 }}>
                  <button onClick={()=>startEdit(tk)} style={{ fontSize:11,padding:"4px 8px",borderRadius:8,border:`1px solid ${T.borderSoft}`,background:"transparent",color:T.textTertiary,cursor:"pointer",fontWeight:600,fontFamily:font }}>edit</button>
                  <button onClick={()=>removeTask(tk.id)} style={{ fontSize:11,padding:"4px 8px",borderRadius:8,border:`1px solid ${T.borderSoft}`,background:"transparent",color:T.textTertiary,cursor:"pointer" }}>✕</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      </div>
      </div>
      <div style={{ textAlign:"center", marginTop:"2rem", opacity:0.4 }}><Clover size={16}/></div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
